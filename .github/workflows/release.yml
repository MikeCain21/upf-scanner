name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Deny all permissions at workflow level; grant only what each job needs
permissions: read-all

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Pass tag via env var — never interpolate ${{ github.ref_name }} directly
      # in run scripts (expression injection risk).
      - name: Validate tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG_NAME' does not match required format v0.0.0"
            exit 1
          fi

      - name: Validate tag version matches manifest.json
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION=$(node -e "process.stdout.write(require('./manifest.json').version)")
          TAG_VERSION="${TAG_NAME#v}"
          if [[ "$TAG_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match manifest.json version '$MANIFEST_VERSION'"
            echo "::error::Please update manifest.json and package.json before tagging."
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package extension ZIP
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ZIP_NAME="upf-scanner-${TAG_NAME}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            background/ \
            content/ \
            lib/ \
            popup/ \
            icons/
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "Packaged: $ZIP_NAME"
          unzip -l "$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          fail_on_unmatched_files: true
