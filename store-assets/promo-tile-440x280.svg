<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="55%">
      <stop offset="0%" stop-color="#1a3a24"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#28a745" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#28a745" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bgGlow)"/>

  <!-- Subtle glow halo behind icon -->
  <ellipse cx="220" cy="122" rx="130" ry="110" fill="url(#iconGlow)"/>

  <!-- Icon: green rounded square -->
  <rect x="148" y="38" width="144" height="144" rx="28" ry="28" fill="#28a745" filter="url(#shadow)"/>

  <!-- "U" lettermark -->
  <text
    x="220"
    y="110"
    font-family="Arial Black, Arial, sans-serif"
    font-size="108"
    font-weight="800"
    text-anchor="middle"
    dominant-baseline="central"
    fill="white"
  >U</text>

  <!-- NOVA 4-colour bar — full width, bottom 42px -->
  <rect x="0"   y="238" width="110" height="42" fill="#28a745"/>
  <rect x="110" y="238" width="110" height="42" fill="#ffc107"/>
  <rect x="220" y="238" width="110" height="42" fill="#fd7e14"/>
  <rect x="330" y="238" width="110" height="42" fill="#dc3545"/>

  <!-- NOVA dot indicators inside colour bar -->
  <circle cx="55"  cy="259" r="8" fill="white" fill-opacity="0.25"/>
  <circle cx="165" cy="259" r="8" fill="white" fill-opacity="0.25"/>
  <circle cx="275" cy="259" r="8" fill="white" fill-opacity="0.25"/>
  <circle cx="385" cy="259" r="8" fill="white" fill-opacity="0.25"/>
</svg>
