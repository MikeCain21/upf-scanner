<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #dc3545;
    }

    .version {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
    }

    .status {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #666;
    }

    .status-value {
      font-weight: bold;
      color: #333;
    }

    .message {
      text-align: center;
      padding: 12px 0;
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }

    .button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .button:hover {
      background-color: #0056b3;
    }

    .button:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    .toggle-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }

    .links {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
    }

    .links a {
      color: #007bff;
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🔴 NOVA Extension</h1>
  <div class="version">Version 0.9.0 — Phase 10</div>

  <div class="status">
    <div class="status-item">
      <span class="status-label">Status:</span>
      <span class="status-value" id="status">Active</span>
    </div>
  </div>

  <div class="message">
    Active on Tesco.com — hover badges for details.
  </div>

  <button class="button" id="clearCache">
    Clear Cache
  </button>

  <label class="toggle-row">
    <input type="checkbox" id="debugMode">
    Debug mode (verbose console logging)
  </label>

  <div class="links">
    <a href="https://world.openfoodfacts.org/nova" target="_blank">📚 NOVA Classification Guide</a>
    <a href="https://github.com/MikeCain21/nova-extension/issues" target="_blank" rel="noopener noreferrer">🐛 Report Issue (GitHub)</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
