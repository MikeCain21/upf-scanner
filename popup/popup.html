<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPF Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #dc3545;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    /* Product score section */
    #product-section {
      display: none;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e0e0e0;
    }

    .product-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .nova-box {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .nova-1 { background-color: #4CAF50; }
    .nova-2 { background-color: #FFC107; }
    .nova-3 { background-color: #FF9800; }
    .nova-4 { background-color: #E53935; }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nova-label {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    .nova-description {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }

    .nova-indicators {
      font-size: 12px;
      color: #c0392b;
      margin-top: 8px;
      line-height: 1.5;
      font-style: italic;
    }

    .off-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #007bff;
      text-decoration: none;
    }

    .off-link:hover {
      text-decoration: underline;
    }

    /* Buttons */
    .button {
      width: 100%;
      padding: 9px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .button:hover {
      background-color: #0056b3;
    }

    .button:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    /* Advanced section */
    details {
      margin-top: 10px;
    }

    summary {
      font-size: 12px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    /* Footer links */
    .links {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
    }

    .links a {
      color: #007bff;
      text-decoration: none;
      display: block;
      margin-bottom: 6px;
    }

    .links a:last-child {
      margin-bottom: 0;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

    /* Enable/disable toggle */
    .toggle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    .toggle-header h1 {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .power-toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .power-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .power-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      border-radius: 22px;
      transition: background-color 0.2s;
    }

    .power-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .power-toggle input:checked + .power-slider {
      background-color: #28a745;
    }

    .power-toggle input:checked + .power-slider::before {
      transform: translateX(18px);
    }

    .power-toggle input:focus-visible + .power-slider {
      outline: 2px solid #007bff;
      outline-offset: 2px;
    }

    #paused-notice {
      display: none;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #555;
      margin-bottom: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header class="toggle-header">
    <h1>UPF Scanner</h1>
    <label class="power-toggle" aria-label="Enable or disable UPF Scanner">
      <input type="checkbox" id="enableToggle" checked>
      <span class="power-slider"></span>
    </label>
  </header>
  <div id="paused-notice">Extension paused — no badges or API calls on this tab.</div>
  <main>
    <section id="product-section" aria-label="Product NOVA score" aria-live="polite" aria-atomic="true">
      <div class="product-row">
        <div id="nova-box" class="nova-box" role="img" aria-label="NOVA score"></div>
        <div class="product-info">
          <div id="product-name" class="product-name"></div>
          <div id="nova-label" class="nova-label"></div>
        </div>
      </div>
      <div id="nova-description" class="nova-description"></div>
      <div id="nova-indicators" class="nova-indicators" style="display:none"></div>
      <a id="off-link" class="off-link" href="#" target="_blank" rel="noopener noreferrer" style="display:none">View on Open Food Facts &rarr;</a>
    </section>

    <button class="button" id="clearCache" aria-describedby="cache-status">Clear Cache</button>
    <div id="cache-status" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <details>
      <summary>Advanced</summary>
      <label class="toggle-row">
        <input type="checkbox" id="debugMode">
        Debug mode
      </label>
    </details>
  </main>

  <nav aria-label="Resources">
    <div class="links">
      <a href="https://world.openfoodfacts.org/nova" target="_blank"
         rel="noopener noreferrer"
         aria-label="NOVA Classification Guide (opens in new tab)">
        📖 NOVA Classification Guide
      </a>
      <a href="https://github.com/MikeCain21/upf-scanner/issues/new/choose" target="_blank"
         rel="noopener noreferrer"
         aria-label="Report Issue on GitHub (opens in new tab)">
        🐛 Report Issue (GitHub)
      </a>
    </div>
  </nav>

  <script src="popup.js"></script>
</body>
</html>
