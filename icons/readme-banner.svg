<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <!-- Green background -->
  <rect width="600" height="130" fill="#28a745"/>

  <!-- Product name wordmark -->
  <text
    x="300"
    y="68"
    font-family="Arial Black, Arial, sans-serif"
    font-size="48"
    font-weight="800"
    text-anchor="middle"
    fill="white"
    letter-spacing="2"
  >UPF Scanner</text>

  <!-- Tagline -->
  <text
    x="300"
    y="105"
    font-family="Arial, sans-serif"
    font-size="16"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.85)"
  >Identify ultra-processed foods while shopping</text>

  <!-- Four-segment NOVA colour bar -->
  <rect x="0"   y="130" width="150" height="30" fill="#28a745"/>
  <rect x="150" y="130" width="150" height="30" fill="#ffc107"/>
  <rect x="300" y="130" width="150" height="30" fill="#fd7e14"/>
  <rect x="450" y="130" width="150" height="30" fill="#dc3545"/>

  <!-- Bar labels -->
  <text x="75"  y="151" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="white">NOVA 1</text>
  <text x="225" y="151" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="white">NOVA 2</text>
  <text x="375" y="151" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="white">NOVA 3</text>
  <text x="525" y="151" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="white">NOVA 4</text>
</svg>
